<div class="page">
  <header class="top-bar">
    <h1 class="brand">{{ titulo }}</h1>

    <div class="stats">
      <button
        class="stat stat-btn"
        type="button"
        [class.active]="modoAtual === 'pomodoro'"
        (click)="selecionarModo('pomodoro')">
        <strong>{{ totalPomodoros }}</strong> pomodoros
      </button>
      <button
        class="stat stat-btn"
        type="button"
        [class.active]="modoAtual === 'descanso'"
        (click)="selecionarModo('descanso')">
        <strong>{{ totalDescansos }}</strong> descansos
      </button>
      <button
        class="stat stat-btn"
        type="button"
        [class.active]="modoAtual === 'longo'"
        (click)="selecionarModo('longo')">
        <strong>{{ totalDescansosLongos }}</strong> longo descansos
      </button>
    </div>

    <button
      class="menu-btn"
      [class.open]="menuAberto"
      type="button"
      aria-label="Menu"
      (click)="alternarMenu()">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </header>

  <main class="timer-area">
    <div class="status-header" [class.active]="relogioAtivo || alarmeAtivo">
      <div class="status-ornament" aria-hidden="true">
        <span class="ornament-line ornament-line--left"></span>
        <svg class="ornament-star" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M10 1.5 L11.4 7.2 L17 8.5 L11.4 9.8 L10 15.5 L8.6 9.8 L3 8.5 L8.6 7.2 Z"
            stroke="currentColor"
            stroke-width="0.85"
            stroke-linejoin="round"/>
        </svg>
        <span class="ornament-line ornament-line--right"></span>
      </div>
      <p class="status-hint">{{ statusTexto }}</p>
    </div>

    <div class="timer" [class.active]="relogioAtivo">
      {{ tempoRestante }}
    </div>

    <div class="session-block">
      <p class="session-info">{{ textoSessao }}</p>
      <div class="session-dots" *ngIf="modoAtual === 'pomodoro'">
        <span
          class="dot"
          *ngFor="let s of sessoes; let i = index"
          [class.filled]="i < sessoesConcluidasNaRodada"
          [class.current]="i === sessoesConcluidasNaRodada && relogioAtivo">
        </span>
      </div>
    </div>

    <div class="timer-actions">
      <button class="btn-start" type="button" (click)="alternarRelogio()">
        <i [ngClass]="relogioAtivo ? 'fa-solid fa-pause' : 'fa-solid fa-play'"></i>
        {{ textoBotaoPrincipal }}
      </button>

      <div class="timer-actions-secondary">
        <a
          class="btn-spotify"
          href="https://open.spotify.com"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Abrir Spotify">
          <i class="fa-brands fa-spotify"></i>
          <span>Spotify</span>
        </a>
        <button
          class="btn-annotations"
          type="button"
          [class.active]="anotacoesAbertas"
          (click)="alternarAnotacoes()">
          <i class="fa-solid fa-pen"></i>
          <span>Anotações</span>
        </button>
      </div>

      <div class="annotations-panel" *ngIf="anotacoesAbertas">
        <textarea
          class="annotations-field"
          rows="3"
          placeholder="Write your notes..."
          [value]="textoAnotacoes"
          (input)="atualizarAnotacoes($event)">
        </textarea>
      </div>
    </div>
  </main>

  <footer class="quote-bar">
    <div class="quote-box">
      <p>"{{ citacaoAtual }}"</p>
    </div>
    <button class="quote-next" type="button" aria-label="Próxima citação" (click)="proximaCitacao()">
      ···
    </button>
  </footer>

  <div class="menu-backdrop" [class.visible]="menuAberto" (click)="fecharMenu()"></div>

  <nav class="side-menu" [class.open]="menuAberto">
    <button
      class="menu-close"
      type="button"
      aria-label="Fechar menu"
      (click)="fecharMenu()">
      <i class="fa-solid fa-xmark"></i>
    </button>

    <div class="menu-section">
      <h3>Controles</h3>
      <div class="menu-actions">
        <button class="btn-primary" type="button" (click)="alternarRelogio()">
          <i [ngClass]="relogioAtivo ? 'fa-solid fa-pause' : 'fa-solid fa-play'"></i>
          {{ relogioAtivo ? 'Pausar foco' : 'Iniciar foco' }}
        </button>
        <button class="btn-secondary" type="button" (click)="reiniciarRelogio()">
          <i class="fa-solid fa-rotate-left"></i> Reiniciar sessão
        </button>
        <button class="btn-secondary" type="button" (click)="testarAlarme()">
          <i class="fa-solid fa-volume-high"></i> Testar alarme
        </button>
      </div>
    </div>

    <div class="menu-section">
      <h3>Rodada {{ rodadas.length }}</h3>
      <div class="dots">
        <span
          class="dot"
          *ngFor="let s of sessoes; let i = index"
          [class.filled]="i < sessoesConcluidasNaRodada"
          [class.current]="i === sessoesConcluidasNaRodada && relogioAtivo">
        </span>
      </div>
    </div>

    <div class="menu-section menu-info">
      <p>Próxima pausa: <strong>{{ proximaPausaMinutos }} min</strong></p>
      <p>{{ horaFormatada }} · {{ dataFormatada }}</p>
    </div>

    <div class="menu-section" *ngIf="rodadas.length > 1 || sessoesConcluidasNaRodada > 0">
      <h3>Cafés do dia</h3>
      <div class="coffees" *ngFor="let quantidade of rodadas">
        <span *ngFor="let item of criarArray(quantidade)">☕</span>
      </div>
    </div>
  </nav>

  <audio #audio src="hora-do-café.wav" preload="auto"></audio>

  <div class="alarmMessage" *ngIf="alarmeAtivo">
    <i class="fa-solid fa-bell"></i>
    <p>{{ mensagemAlarme }}</p>
    <button type="button" (click)="pararAlarme()">Parar alarme</button>
  </div>
</div>
